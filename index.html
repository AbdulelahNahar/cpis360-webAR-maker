<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs>
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" color="red" rotation="0 45 0" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 405 0; loop: true; dur: 4000"></a-box>
        <a-sphere position="1 0.5 0" color="blue" radius="0.3"></a-sphere>
        <a-cylinder position="-1 0.5 0" color="green" height="0.5" radius="0.2"></a-cylinder>
        <a-text value="Your Name" position="0 1 0" color="yellow"></a-text>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
